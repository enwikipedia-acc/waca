# Redirect PID file and mutex directory to the scratch emptyDir volume so
# Apache can run with readOnlyRootFilesystem: true in Kubernetes.
PidFile /tmp/apache2.pid
Mutex file:/tmp default

# Suppress version strings from Server: header and error pages.
ServerTokens Prod
ServerSignature Off

# Baseline security headers (requires mod_headers).
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
</IfModule>
